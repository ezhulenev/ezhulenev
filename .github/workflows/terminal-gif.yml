name: Refresh profile terminal

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"
  push:
    branches: [main]
    paths:
      - main.py
      - .github/workflows/terminal-gif.yml

permissions:
  contents: read

concurrency:
  group: profile-terminal-gif
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out profile repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Fetch GitHub profile data
        run: python -S main.py --fetch-profile "$RUNNER_TEMP/profile.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install renderer
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ffmpeg
          python -m pip install --disable-pip-version-check \
            "git+https://github.com/x0rzavi/github-readme-terminal.git@09333eace9e35c6d7705f92f5e669810e82283d1"

      - name: Generate terminal GIF
        run: python main.py --profile-json "$RUNNER_TEMP/profile.json"
        env:
          GIFOS_GENERAL_COLOR_SCHEME: dracula
          GIFOS_GENERAL_FPS: "13"
          GIFOS_GENERAL_LOOP_COUNT: "0"
          GIFOS_GENERAL_USER_NAME: ezhulenev

      - name: Upload terminal GIF
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: profile-terminal
          path: assets/terminal.gif
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

  publish:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Check out profile repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false

      - name: Download terminal GIF
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: profile-terminal
          path: assets

      - name: Commit refreshed GIF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add assets/terminal.gif
          if git diff --cached --quiet; then
            echo "Terminal GIF is already current."
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "chore: refresh profile terminal"
          basic_auth="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w0)"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $basic_auth" \
              push origin HEAD:main
